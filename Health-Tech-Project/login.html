<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <!-- global stylesheet -->
    <link rel="stylesheet" href="style.css" />
    <style>
      /* simple responsive login form styles */
      .login-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        background: #f5f7fa;
      }

      .login-card {
        background: #fff;
        padding: 32px 24px;
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
      }

      .login-card h2 {
        margin-bottom: 24px;
        text-align: center;
        font-size: 1.5rem;
        color: #1e293b;
      }

      .login-card label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 500;
        font-size: 0.95rem;
      }

      .login-card input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 0.95rem;
      }

      .login-card .btn-primary {
        width: 100%;
        margin-top: 24px;
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 24px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <h2>Sign In</h2>
        <form id="loginForm" action="index.html" method="get">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your username" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>

          <button type="submit" class="btn-primary">Login</button>
        </form>
      </div>
    </div>    <script>
      // simple redirect if form is valid (action handles it as well)
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        // here you can add validation or authentication logic
        // for now we allow the form's action to take care of navigation
      });
    </script>  </body>
</html>
