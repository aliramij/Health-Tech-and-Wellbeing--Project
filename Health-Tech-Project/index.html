<!DOCTYPE html>
<html>
<head>
<title>Health Companion</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">
<h1>🏥 Health Companion</h1>
<p>Smart Wellness + AI Health Assistant</p>
</div>

<!-- Wellness Section -->

<div class="card">

<h2>🌿 Wellness Timer</h2>

<h3 id="time">25:00</h3>

<div class="progress-bar">
<div id="progress"></div>
</div>

<button onclick="startTimer()">Start Work Session</button>

<div class="buttons">
<button onclick="addScore()">💧 Drink Water</button>
<button onclick="addScore()">🧘 Stretch</button>
<button onclick="addScore()">🌬 Breathing</button>
</div>

<p id="score">Score: 0</p>

</div>


<!-- Symptom Checker -->

<div class="card">

<h2>🧠 AI Symptom Checker</h2>

<input id="symptom" placeholder="Enter symptoms">

<button onclick="checkSymptom()">Check Doctor</button>

<p id="result"></p>

</div>


<!-- Map -->

<div class="card">

<h2>📍 Find Hospitals</h2>

<button onclick="showMap()">Show Nearby Hospitals</button>

<div id="map" style="display:none">

<iframe
width="100%"
height="300"
style="border-radius:8px;border:0"
src="https://www.google.com/maps?q=hospital+near+me&output=embed">
</iframe>

</div>

</div>


<!-- Chatbot -->

<div class="card">

<h2>🤖 AI Doctor Chatbot</h2>

<div id="chatbox"></div>

<input id="userInput" placeholder="Ask about symptoms">

<button onclick="chat()">Send</button>

</div>


<script src="script.js"></script>

</body>
</html>
