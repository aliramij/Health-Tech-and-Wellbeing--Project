<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <!-- global stylesheet -->
    <link rel="stylesheet" href="css/style.css" />
    <style>
      /* simple responsive login form styles */
      .login-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        background: #f5f7fa;
      }

      .login-card {
        background: #fff;
        padding: 32px 24px;
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
      }

      .login-card h2 {
        margin-bottom: 24px;
        text-align: center;
        font-size: 1.5rem;
        color: #1e293b;
      }

      .login-card label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 500;
        font-size: 0.95rem;
      }

      .login-card input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 0.95rem;
      }

      .login-card .btn-primary {
        width: 100%;
        margin-top: 24px;
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 24px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <h2>Welcome Back</h2>
        <p id="errorMsg" style="color:#e00; text-align:center; display:none;"></p>
        <form id="loginForm" action="https://health-tech-and-wellbeing-project.onrender.com/login" method="post">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your username" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>

          <label for="password">Password</label>
          <div style="position:relative;">
            <input type="password" id="password" name="password" placeholder="Your password" required style="padding-right:32px;">
            <span id="togglePwd" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1.1rem; color:#888;">👁️</span>
          </div>

          <small id="pwdHint" style="display:block; font-size:0.85rem; color:#555;">
            Minimum 8 characters, one uppercase, one number and one special character.
          </small>

          <button type="submit" class="btn-primary">Login</button>
        </form>
        <p style="text-align:center; margin-top:16px;">
          New here? <a href="register.html" id="create_account">Create an account</a>
        </p>
      </div>
    </div>    <script>
      // Check if the page is opened directly from file system
      if (window.location.protocol === 'file:') {
        document.body.innerHTML = '<div style="display:flex; align-items:center; justify-content:center; height:100vh; font-family:Arial, sans-serif;"><div style="text-align:center;"><h1>Please Run the Server</h1><p>To use the login functionality, please run the server first:</p><code>npm run dev</code><p>Then open <a href="http://localhost:3000/login.html">http://localhost:3000/login.html</a> in your browser.</p></div></div>';
      }

      function showErrorMessage() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === 'notfound') {
          const msg = document.getElementById('errorMsg');
          msg.textContent = 'No account matches those credentials.';
          msg.style.display = 'block';
        }
      }

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        // No password validation needed for login; server handles it
      });

      // toggle visibility
      document.getElementById('togglePwd').addEventListener('click', function() {
        const input = document.getElementById('password');
        if (input.type === 'password') {
          input.type = 'text';
          this.textContent = '🙈';
        } else {
          input.type = 'password';
          this.textContent = '👁️';
        }
      });

      showErrorMessage();
    </script>  </body>
</html>
